# Issue #23 fix: removed deprecated 'version' key (Docker Compose v2+).

services:
  # PostgreSQL database service
  db:
    image: postgres:15-alpine
    container_name: ticket-system-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ticketdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Go application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-system-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: ${PORT:-8080}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      # Issue #9 fix: DB_PASSWORD and JWT_SECRET now read from host environment
      # or .env file — never hardcoded in this file.
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-ticketdb}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
